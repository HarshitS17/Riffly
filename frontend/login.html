<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Riffly — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
<style>
/* ── Reset ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #07070f;
  --purple:      #7c6ef7;
  --purple-glow: rgba(124,110,247,0.35);
  --teal:        #29e7cd;
  --teal-dim:    rgba(41,231,205,0.15);
  --glass-bg:    rgba(255,255,255,0.035);
  --glass-border:rgba(255,255,255,0.09);
  --text:        #f0eeff;
  --text-dim:    rgba(240,238,255,0.5);
  --text-muted:  rgba(240,238,255,0.28);
  --input-bg:    rgba(255,255,255,0.05);
  --error:       #ff6b8a;
  --success:     #29e7cd;
  --radius:      16px;
  --ease:        cubic-bezier(0.22,0.68,0,1.2);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* ── Background orbs ────────────────────────────────────────────── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(100px); opacity: 0.15;
  animation: drift 20s ease-in-out infinite alternate;
}
.orb-1 { width:600px;height:600px;background:radial-gradient(circle,#7c6ef7,#2a0080);top:-180px;left:-160px;animation-duration:24s; }
.orb-2 { width:400px;height:400px;background:radial-gradient(circle,#29e7cd,#064040);bottom:-60px;right:-100px;animation-duration:18s;animation-delay:-9s; }
.orb-3 { width:280px;height:280px;background:radial-gradient(circle,#3d9bff,#020d30);top:40%;left:55%;animation-duration:28s;animation-delay:-5s;opacity:0.1; }
@keyframes drift {
  0%  { transform: translate(0,0) scale(1); }
  50% { transform: translate(30px,-40px) scale(1.06); }
  100%{ transform: translate(-20px,30px) scale(0.96); }
}

/* Floating music notes */
.note { position:absolute; font-size:18px; opacity:0; pointer-events:none; animation: floatNote 8s ease-in-out infinite; }
.note:nth-child(1) { left:8%;  top:70%; animation-delay:0s;   animation-duration:9s;  }
.note:nth-child(2) { left:88%; top:60%; animation-delay:2s;   animation-duration:11s; }
.note:nth-child(3) { left:15%; top:20%; animation-delay:4s;   animation-duration:8s;  }
.note:nth-child(4) { left:75%; top:15%; animation-delay:1.5s; animation-duration:12s; }
.note:nth-child(5) { left:50%; top:80%; animation-delay:3s;   animation-duration:10s; }
@keyframes floatNote {
  0%   { opacity:0; transform:translateY(0) rotate(0deg); }
  20%  { opacity:0.2; }
  80%  { opacity:0.15; }
  100% { opacity:0; transform:translateY(-120px) rotate(20deg); }
}

/* ── Layout ─────────────────────────────────────────────────────── */
.page {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ── Card ───────────────────────────────────────────────────────── */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px 36px 36px;
  backdrop-filter: blur(28px);
  box-shadow:
    0 0 0 1px rgba(124,110,247,0.06),
    0 32px 80px rgba(0,0,0,0.5),
    0 0 60px rgba(124,110,247,0.06);
  animation: cardIn 0.6s var(--ease) both;
  transform-style: preserve-3d;
  transition: transform 400ms var(--ease), box-shadow 400ms;
}
.card:hover {
  transform: rotateX(1deg) rotateY(-1deg) translateY(-3px);
  box-shadow:
    0 0 0 1px rgba(124,110,247,0.12),
    0 40px 100px rgba(0,0,0,0.55),
    0 0 80px rgba(124,110,247,0.1);
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(30px) scale(0.96); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ── Logo ───────────────────────────────────────────────────────── */
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  justify-content: center;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--purple), var(--teal));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px var(--purple-glow);
  animation: iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse {
  0%,100% { box-shadow: 0 0 20px var(--purple-glow); }
  50%      { box-shadow: 0 0 36px rgba(124,110,247,0.6); }
}
.logo-icon svg { width:20px; height:20px; }
.logo-text {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(120deg, #fff 30%, var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Tab toggle ─────────────────────────────────────────────────── */
.tabs {
  display: flex;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}
.tab {
  flex: 1;
  padding: 9px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  border-radius: 9px;
  cursor: pointer;
  transition: all 240ms var(--ease);
  border: 1px solid transparent;
  user-select: none;
}
.tab.active {
  background: linear-gradient(135deg, rgba(124,110,247,0.2), rgba(41,231,205,0.1));
  border-color: rgba(124,110,247,0.25);
  color: var(--text);
  box-shadow: 0 2px 12px rgba(124,110,247,0.15);
}

/* ── Heading ────────────────────────────────────────────────────── */
.heading {
  text-align: center;
  margin-bottom: 26px;
}
.heading h2 {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 5px;
}
.heading p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ── Form ───────────────────────────────────────────────────────── */
.form { display: flex; flex-direction: column; gap: 14px; }

.field { display: flex; flex-direction: column; gap: 7px; }
.field label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.field-inner {
  position: relative;
  display: flex;
  align-items: center;
}
.field-icon {
  position: absolute;
  left: 14px;
  color: var(--text-muted);
  pointer-events: none;
  width: 16px; height: 16px;
  flex-shrink: 0;
}
.field input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  background: var(--input-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 220ms;
}
.field input::placeholder { color: var(--text-muted); }
.field input:focus {
  border-color: rgba(124,110,247,0.45);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 0 3px rgba(124,110,247,0.1);
}
.field input.error-input { border-color: rgba(255,107,138,0.5); }

/* ── Error + status messages ────────────────────────────────────── */
.msg {
  font-size: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  display: none;
  line-height: 1.4;
}
.msg.error   { background:rgba(255,107,138,0.1); border:1px solid rgba(255,107,138,0.25); color:var(--error); }
.msg.success { background:rgba(41,231,205,0.08); border:1px solid rgba(41,231,205,0.2);   color:var(--success); }
.msg.visible { display: block; animation: msgIn 250ms var(--ease); }
@keyframes msgIn { from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none} }

/* ── Submit button ──────────────────────────────────────────────── */
.btn-submit {
  width: 100%;
  padding: 13px;
  margin-top: 4px;
  background: linear-gradient(135deg, var(--purple), #3d9bff);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: 0 4px 20px rgba(124,110,247,0.3);
  transition: all 220ms var(--ease);
  position: relative;
  overflow: hidden;
}
.btn-submit::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
  opacity: 0;
  transition: opacity 200ms;
}
.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124,110,247,0.45);
}
.btn-submit:hover::before { opacity: 1; }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Spinner inside button */
.spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-submit.loading .btn-label { display: none; }
.btn-submit.loading .spinner   { display: block; }

/* ── Divider ────────────────────────────────────────────────────── */
.divider {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 18px;
  letter-spacing: 0.3px;
}

/* ── Form panel transition ──────────────────────────────────────── */
.panel {
  transition: opacity 250ms, transform 250ms var(--ease);
}
.panel.hidden {
  opacity: 0;
  transform: translateX(12px);
  pointer-events: none;
  position: absolute;
}
</style>
</head>
<body>

<!-- Ambient background -->
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="note">♪</div>
  <div class="note">♫</div>
  <div class="note">♩</div>
  <div class="note">♬</div>
  <div class="note">🎵</div>
</div>

<div class="page">
  <div class="card" id="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <span class="logo-text">Riffly</span>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tabLogin"    onclick="switchTab('login')">Sign In</div>
      <div class="tab"        id="tabRegister" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- Status message -->
    <div class="msg" id="msg"></div>

    <!-- ── LOGIN FORM ── -->
    <div class="panel" id="panelLogin">
      <div class="heading">
        <h2>Welcome back</h2>
        <p>Sign in to your Riffly account</p>
      </div>
      <div class="form">
        <div class="field">
          <label>Username</label>
          <div class="field-inner">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="loginUsername" placeholder="your_username" autocomplete="username" />
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-inner">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
          </div>
        </div>
        <button class="btn-submit" id="btnLogin" onclick="doLogin()">
          <span class="btn-label">Sign In</span>
          <div class="spinner"></div>
        </button>
      </div>
      <div class="divider">Don't have an account? <a href="#" onclick="switchTab('register')" style="color:var(--purple);text-decoration:none;font-weight:500">Create one</a></div>
    </div>

    <!-- ── REGISTER FORM ── -->
    <div class="panel hidden" id="panelRegister">
      <div class="heading">
        <h2>Create your account</h2>
        <p>Join Riffly and start streaming</p>
      </div>
      <div class="form">
        <div class="field">
          <label>Display Name</label>
          <div class="field-inner">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="regDisplay" placeholder="Your Name" autocomplete="name" />
          </div>
        </div>
        <div class="field">
          <label>Username</label>
          <div class="field-inner">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>
            <input type="text" id="regUsername" placeholder="cool_username" autocomplete="username" />
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-inner">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password" />
          </div>
        </div>
        <button class="btn-submit" id="btnRegister" onclick="doRegister()">
          <span class="btn-label">Create Account</span>
          <div class="spinner"></div>
        </button>
      </div>
      <div class="divider">Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--purple);text-decoration:none;font-weight:500">Sign in</a></div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:8080/api';

/* ── Tab switching ──────────────────────────────────────────────── */
function switchTab(tab) {
  clearMsg();
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('panelLogin').classList.toggle('hidden', !isLogin);
  document.getElementById('panelRegister').classList.toggle('hidden', isLogin);
}

/* ── Auth actions ───────────────────────────────────────────────── */
async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) { showMsg('Please fill in all fields.', 'error'); return; }

  const btn = document.getElementById('btnLogin');
  setLoading(btn, true);
  clearMsg();

  try {
    const data = await authRequest('/auth/login', { username, password });
    saveSession(data);
    showMsg('Login successful! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch (err) {
    showMsg(err.message, 'error');
  } finally {
    setLoading(btn, false);
  }
}

async function doRegister() {
  const displayName = document.getElementById('regDisplay').value.trim();
  const username    = document.getElementById('regUsername').value.trim();
  const password    = document.getElementById('regPassword').value;

  if (!username || !password) { showMsg('Username and password are required.', 'error'); return; }
  if (password.length < 6)    { showMsg('Password must be at least 6 characters.', 'error'); return; }

  const btn = document.getElementById('btnRegister');
  setLoading(btn, true);
  clearMsg();

  try {
    const data = await authRequest('/auth/register', { username, password, displayName: displayName || username });
    saveSession(data);
    showMsg('Account created! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch (err) {
    showMsg(err.message, 'error');
  } finally {
    setLoading(btn, false);
  }
}

/* ── API helper ─────────────────────────────────────────────────── */
async function authRequest(path, body) {
  const res = await fetch(API + path, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(body),
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.message || 'Request failed');
  return json.data;
}

function saveSession(data) {
  localStorage.setItem('riffly_token',    data.token);
  localStorage.setItem('riffly_username', data.username);
  localStorage.setItem('riffly_display',  data.displayName);
}

/* ── UI helpers ─────────────────────────────────────────────────── */
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className   = `msg ${type} visible`;
}
function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
}
function setLoading(btn, on) {
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

/* ── Enter key support ──────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVisible = !document.getElementById('panelLogin').classList.contains('hidden');
  if (loginVisible) doLogin(); else doRegister();
});

/* ── If already logged in, skip login page ──────────────────────── */
if (localStorage.getItem('riffly_token')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
