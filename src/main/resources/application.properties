# ------------------------------------------------------------
# Riffly v2 ? application.properties
# ------------------------------------------------------------

# --- Server --------------------------------------------------
server.port=8080
server.servlet.context-path=/api

# --- PostgreSQL ----------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/riffly_db
spring.datasource.username=riffly_user
spring.datasource.password=riffly_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate -----------------------------------------
spring.jpa.hibernate.ddl-auto=create
 spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- File Storage --------------------------------------------
# Update this to the absolute path of your music folder
riffly.storage.music-dir=/Users/saini/riffly/music
riffly.storage.allowed-extensions=mp3,flac,wav,ogg,aac,m4a

# --- Streaming -----------------------------------------------
riffly.streaming.buffer-size=8192
riffly.streaming.chunk-size=524288

# --- CORS ----------------------------------------------------
# Both localhost and 127.0.0.1 must be listed ? browsers treat them
# as different origins. Adjust ports to match your dev setup.
riffly.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501

# --- JWT -----------------------------------------------------
# SECRET: Use a random Base64 string of at least 32 chars in production.
# Generate one: openssl rand -base64 48
riffly.jwt.secret=cmln5y9XjP7qOzD3tNw8mK2rVhAeGbFsLuQxYpMdWiJcTvZ0nBsKaEoR1gH4fU6

# Token validity in milliseconds (86400000 = 24 hours)
riffly.jwt.expiration-ms=86400000

# --- Multipart -----------------------------------------------
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# --- Logging -------------------------------------------------
logging.level.com.riffly=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN